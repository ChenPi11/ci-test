name: Test

on:
  release:
    types: [published]
  push:

jobs:
  test:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
         - { sys: MSYS, prefix: none}

    defaults:
      run:
        shell: msys2 {0}

    steps:

    - uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.sys }}
        update: true
        install: >-
          git
          ${{ matrix.prefix }}toolchain
          ${{ matrix.prefix }}cmake
      if: matrix.sys != 'MSYS'

    - uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.sys }}
        update: true
        install: >-
          git
          cmake
          make
          clang
      if: matrix.sys == 'MSYS'

    - run: |
       git clone https://github.com/cppp-project/cppp-reiconv --depth 1 -b dev
       cd cppp-reiconv
       git clone https://github.com/cppp-project/build-aux --depth 1
       mkdir build
       cd build
       cmake .. -DBUILD_TESTING=ON
       cmake --build . --config=Release
       ctest -C Release --verbose
