name: Test

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Rubisco
      uses: ChenPi11/rubisco@main
    - name: Run Rubisco
      run: |
        git clone https://github.com/cppp-project/cppp-reiconv --depth 1 -b dev
        cd cppp-reiconv
        git clone https://github.com/cppp-project/build-aux --depth 1
        ru test
