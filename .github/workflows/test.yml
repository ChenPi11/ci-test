name: Test

on: push

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Setup
        uses: ChenPi11/ci-test@main
      - name: Test
        run: |
          7z --help
          gzip --version
          tar --version
          xz --version
          zip --version
          curl --version
          wget --version
          python3 --version
          pip3 --version
          python --version
          pip --version
          clang --version
          cmake --version
          ninja --version

